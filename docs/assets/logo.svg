<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="BigClust">
  <!-- The mark carries its own dark plate rather than being a bare white glyph:
       it is used both as the header logo (on the deep-orange bar) and as the
       favicon (on whatever the browser's tab strip happens to be). -->
  <rect width="64" height="64" rx="14" fill="#17151c"/>
  <g>
    <!-- cluster one -->
    <circle cx="19" cy="20" r="3.4" fill="#ff7043"/>
    <circle cx="27" cy="15" r="2.6" fill="#ff7043" opacity=".85"/>
    <circle cx="14" cy="27" r="2.2" fill="#ff7043" opacity=".7"/>
    <circle cx="24" cy="24" r="2" fill="#ff7043" opacity=".55"/>
    <!-- cluster two -->
    <circle cx="45" cy="24" r="3.4" fill="#26c6da"/>
    <circle cx="51" cy="17" r="2.4" fill="#26c6da" opacity=".85"/>
    <circle cx="39" cy="18" r="2.1" fill="#26c6da" opacity=".65"/>
    <circle cx="49" cy="31" r="2" fill="#26c6da" opacity=".5"/>
    <!-- cluster three -->
    <circle cx="31" cy="44" r="3.6" fill="#ffca28"/>
    <circle cx="40" cy="48" r="2.6" fill="#ffca28" opacity=".85"/>
    <circle cx="22" cy="48" r="2.3" fill="#ffca28" opacity=".7"/>
    <circle cx="33" cy="53" r="2" fill="#ffca28" opacity=".55"/>
  </g>
</svg>
